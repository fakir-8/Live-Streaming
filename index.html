<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStream | Pro Mesh Architecture</title>
    
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            background-image: radial-gradient(at 50% 0%, rgba(234, 88, 12, 0.15) 0px, transparent 50%);
            color: #ededed;
        }
        .glass-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        /* Dynamic Aspect Ratios */
        .ratio-landscape { aspect-ratio: 16 / 9; }
        .ratio-portrait { aspect-ratio: 9 / 16; max-height: 70vh; }
        
        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8 antialiased selection:bg-orange-500/30">

    <div class="w-full max-w-3xl glass-card rounded-2xl p-6 md:p-8 transition-all duration-300">
        
        <div class="flex items-center justify-between border-b border-white/10 pb-5 mb-6">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7 text-orange-500">
                    <path fill-rule="evenodd" d="M12.963 2.286a.75.75 0 00-1.071-.136 9.742 9.742 0 00-3.539 6.177A7.547 7.547 0 016.648 6.61a.75.75 0 00-1.152-.082A9 9 0 1015.68 4.534a7.46 7.46 0 01-2.717-2.248z" clip-rule="evenodd" />
                </svg>
                <h1 class="text-xl font-bold tracking-tight text-white">FireStream <span class="text-orange-500">Pro</span></h1>
            </div>
            <div class="flex flex-col items-end">
                <span id="db-status" class="text-[10px] uppercase tracking-widest text-zinc-500 font-semibold flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-zinc-600" id="db-indicator"></span> DB Standby
                </span>
            </div>
        </div>

        <div id="setup-panel" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Stream Access Key</label>
                <input type="text" id="passcode" placeholder="Enter secure key..." class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-orange-500 transition-colors placeholder:text-zinc-600">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Stream Format (Broadcaster Only)</label>
                <select id="ratio-select" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-orange-500 appearance-none">
                    <option value="landscape">Cinematic Landscape (16:9)</option>
                    <option value="portrait">Mobile Portrait (9:16)</option>
                </select>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-4 border-t border-white/5">
                <button onclick="initializeNode('broadcaster')" class="bg-orange-600 hover:bg-orange-500 text-white font-semibold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Start Broadcast
                </button>
                <button onclick="initializeNode('viewer')" class="bg-zinc-800 hover:bg-zinc-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors border border-zinc-700 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    Join Stream
                </button>
            </div>
        </div>

        <div id="player-panel" class="hidden flex flex-col items-center">
            
            <div id="video-frame" class="w-full relative rounded-xl overflow-hidden bg-zinc-950 border border-zinc-800 flex items-center justify-center shadow-2xl ratio-landscape transition-all duration-500">
                
                <video id="local-preview" autoplay muted playsinline class="absolute inset-0 w-full h-full object-cover hidden"></video>
                
                <div id="viewer-mount" class="absolute inset-0 w-full h-full"></div>

                <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-950/90 backdrop-blur-sm z-10">
                    <svg class="animate-spin -ml-1 mr-3 h-8 w-8 text-orange-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p id="system-log" class="text-sm font-medium text-zinc-300">Synchronizing with swarm...</p>
                </div>
            </div>

            <div class="w-full mt-4 flex justify-between items-center text-xs text-zinc-500 font-mono bg-zinc-900/50 p-3 rounded-lg border border-white/5">
                <span id="diagnostic-role">Role: Pending</span>
                <span id="diagnostic-peers">Peers: 0</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5rCtILh3LmIy9BwQV8IVtHBeshlog1jI",
            authDomain: "quickchatapp-57890.firebaseapp.com",
            databaseURL: "https://quickchatapp-57890-default-rtdb.firebaseio.com",
            projectId: "quickchatapp-57890",
            storageBucket: "quickchatapp-57890.firebasestorage.app",
            messagingSenderId: "732242608209",
            appId: "1:732242608209:web:d38008e8a4453a6d16b870"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // EXPLICIT TRACKERS: The fix for the infinite loading loop
        const MESH_TRACKERS = [
            'wss://tracker.openwebtorrent.com',
            'wss://tracker.btorrent.xyz',
            'wss://tracker.webtorrent.dev'
        ];

        const client = new WebTorrent({ tracker: { announce: MESH_TRACKERS } });

        // DOM Nodes
        const setupPanel = document.getElementById('setup-panel');
        const playerPanel = document.getElementById('player-panel');
        const videoFrame = document.getElementById('video-frame');
        const localPreview = document.getElementById('local-preview');
        const viewerMount = document.getElementById('viewer-mount');
        const loadingOverlay = document.getElementById('loading-overlay');
        const systemLog = document.getElementById('system-log');
        const dbIndicator = document.getElementById('db-indicator');
        const dbStatusTxt = document.getElementById('db-status');

        function updateLog(msg) { systemLog.innerText = msg; }
        
        function setDBStatus(status) {
            if(status === 'connected') {
                dbIndicator.className = 'w-2 h-2 rounded-full bg-green-500 animate-pulse';
                dbStatusTxt.style.color = '#22c55e';
            } else if (status === 'error') {
                dbIndicator.className = 'w-2 h-2 rounded-full bg-red-500';
                dbStatusTxt.style.color = '#ef4444';
            }
        }

        window.initializeNode = async (role) => {
            const rawRoom = document.getElementById('passcode').value.trim();
            if (!rawRoom) return alert("A stream key is required.");
            const roomCode = rawRoom.toLowerCase().replace(/[^a-z0-9-]/g, '-');
            const ratioFormat = document.getElementById('ratio-select').value;

            setupPanel.classList.add('hidden');
            playerPanel.classList.remove('flex'); // Reset
            playerPanel.classList.add('flex');
            
            document.getElementById('diagnostic-role').innerText = `Role: ${role.toUpperCase()}`;

            const roomRef = ref(db, `firestream/${roomCode}`);
            setDBStatus('connected');

            if (role === 'broadcaster') {
                updateLog("Checking room constraints...");
                const snapshot = await get(roomRef);
                if (snapshot.exists() && snapshot.val().active) {
                    alert("Room collision detected. Please use a different key.");
                    window.location.reload();
                    return;
                }

                // Apply Ratio to UI
                if (ratioFormat === 'portrait') {
                    videoFrame.classList.remove('ratio-landscape');
                    videoFrame.classList.add('ratio-portrait');
                }

                // Write initial database lock containing ratio data
                await set(roomRef, { active: true, format: ratioFormat, hash: null, timestamp: Date.now() });
                onDisconnect(roomRef).remove();

                updateLog("Requesting hardware access...");
                try {
                    // Hardware constraints mapping based on user selection
                    const constraints = {
                        audio: true,
                        video: ratioFormat === 'portrait' 
                            ? { width: { ideal: 720 }, height: { ideal: 1280 }, facingMode: 'user' }
                            : { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    localPreview.srcObject = stream;
                    localPreview.classList.remove('hidden');
                    loadingOverlay.classList.add('hidden');

                    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp8' });
                    
                    recorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            const chunkFile = new File([e.data], `live-${Date.now()}.webm`, { type: 'video/webm' });
                            
                            // Explicit tracker declaration prevents network isolation
                            client.seed(chunkFile, { announce: MESH_TRACKERS }, (torrent) => {
                                set(roomRef, { 
                                    active: true, 
                                    format: ratioFormat,
                                    hash: torrent.infoHash, 
                                    timestamp: Date.now() 
                                });
                                document.getElementById('diagnostic-peers').innerText = `Peers: ${torrent.numPeers}`;
                            });
                        }
                    };
                    recorder.start(4000);

                } catch (err) {
                    setDBStatus('error');
                    updateLog("Hardware Error. Check permissions.");
                }

            } else if (role === 'viewer') {
                updateLog("Awaiting broadcast signals...");
                let lastHash = null;

                onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    
                    if (!data || !data.active) {
                        updateLog("Stream ended or not found.");
                        loadingOverlay.classList.remove('hidden');
                        viewerMount.innerHTML = '';
                        return;
                    }

                    // Dynamically adapt UI to broadcaster's chosen format
                    if (data.format === 'portrait') {
                        videoFrame.classList.remove('ratio-landscape');
                        videoFrame.classList.add('ratio-portrait');
                    } else {
                        videoFrame.classList.remove('ratio-portrait');
                        videoFrame.classList.add('ratio-landscape');
                    }

                    if (data.hash && data.hash !== lastHash) {
                        lastHash = data.hash;
                        updateLog("Routing chunks through mesh...");
                        
                        if (client.get(data.hash)) return;

                        // Explicit tracker routing for viewers ensures successful handshakes
                        client.add(data.hash, { announce: MESH_TRACKERS }, (torrent) => {
                            const videoFile = torrent.files.find(f => f.name.endsWith('.webm'));
                            if (!videoFile) return;

                            torrent.on('wire', () => {
                                document.getElementById('diagnostic-peers').innerText = `Peers: ${torrent.numPeers}`;
                            });

                            // AUTOPLAY FIX: Render muted explicitly to bypass mobile browser locks
                            videoFile.renderTo(viewerMount, { autoplay: true, muted: true }, (err, elem) => {
                                if (err) return;
                                
                                loadingOverlay.classList.add('hidden');
                                elem.classList.add('w-full', 'h-full', 'object-cover', 'absolute', 'inset-0');
                                elem.setAttribute('playsinline', 'true');
                                
                                // Clean up old memory nodes
                                const oldNodes = viewerMount.querySelectorAll('video');
                                if (oldNodes.length > 1) oldNodes[0].remove();
                            });
                        });
                    }
                });
            }
        };
    </script>
</body>
</html>
