<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStream | Live Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --md-sys-color-surface: rgba(20, 20, 24, 0.7);
            --md-sys-color-on-surface: #F3F4F6;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #050505;
            color: var(--md-sys-color-on-surface);
            overflow-x: hidden;
            margin: 0;
            min-height: 100vh;
        }
        
        /* Hyper-Complex Multi-Shape Mesh Gradient Background */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(220, 38, 38, 0.15), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(234, 88, 12, 0.2), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(147, 51, 234, 0.1), transparent 50%);
            filter: blur(60px);
            animation: pulse-mesh 15s ease-in-out infinite alternate;
        }

        @keyframes pulse-mesh {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Material Design 3 Glassmorphism Panel */
        .glass-panel {
            background: var(--md-sys-color-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .ratio-landscape { aspect-ratio: 16 / 9; }
        .ratio-portrait { aspect-ratio: 9 / 16; max-height: 75vh; }
        
        video {
            border-radius: 0.75rem;
            outline: none;
        }
        video::-webkit-media-controls-panel {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 selection:bg-orange-500/30">
    <div class="mesh-bg"></div>

    <div class="w-full max-w-4xl glass-panel rounded-3xl p-6 md:p-10 transition-all duration-500 relative overflow-hidden">
        
        <div id="toast-alert" class="absolute top-0 left-0 w-full p-3 bg-red-600 text-white text-sm font-semibold text-center transform -translate-y-full transition-transform duration-300 z-50">
            Error message here
        </div>

        <div class="flex items-center justify-between border-b border-white/10 pb-6 mb-8">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-orange-600 to-red-500 flex items-center justify-center shadow-lg shadow-orange-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white">FireStream</h1>
            </div>
            <div id="status-chip" class="px-4 py-1.5 text-sm font-semibold bg-zinc-800/50 text-zinc-400 rounded-full border border-zinc-700/50 backdrop-blur-md transition-all">
                System Idle
            </div>
        </div>

        <div id="setup-panel" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <label class="text-sm font-semibold text-zinc-300">Stream Passcode</label>
                    <input type="text" id="passcode" placeholder="Enter secure key..." class="w-full bg-black/40 border border-zinc-700 rounded-2xl px-5 py-4 text-lg text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all placeholder:text-zinc-600">
                </div>
                
                <div class="space-y-3">
                    <label class="text-sm font-semibold text-zinc-300">Format</label>
                    <select id="ratio-select" class="w-full bg-black/40 border border-zinc-700 rounded-2xl px-5 py-4 text-lg text-white focus:outline-none focus:border-orange-500 appearance-none transition-all">
                        <option value="landscape">Cinematic (16:9)</option>
                        <option value="portrait">Mobile Portrait (9:16)</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4">
                <button onclick="bootSystem('broadcaster')" class="group relative bg-white text-black font-bold py-4 px-6 rounded-2xl transition-all hover:scale-[1.02] shadow-xl">
                    <span class="flex items-center justify-center gap-2">Start Broadcast</span>
                </button>
                <button onclick="bootSystem('viewer')" class="bg-zinc-800/50 hover:bg-zinc-700/50 text-white font-bold py-4 px-6 rounded-2xl transition-all border border-zinc-600 hover:border-zinc-400">
                    <span class="flex items-center justify-center gap-2">Join Stream</span>
                </button>
            </div>
        </div>

        <div id="player-panel" class="hidden flex-col items-center w-full">
            <div id="video-frame" class="w-full relative rounded-2xl overflow-hidden bg-black/80 border border-zinc-800 shadow-2xl transition-all duration-700 flex items-center justify-center ratio-landscape">
                
                <video id="local-preview" autoplay muted playsinline class="absolute inset-0 w-full h-full object-cover hidden"></video>
                
                <div id="viewer-mount" class="absolute inset-0 w-full h-full z-10"></div>

                <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-md z-20 transition-opacity duration-300">
                    <div class="w-12 h-12 border-4 border-zinc-600 border-t-orange-500 rounded-full animate-spin mb-6"></div>
                    <p id="ui-state-text" class="text-lg font-medium text-white tracking-wide">Connecting to Firebase...</p>
                    <p id="ui-sub-text" class="text-sm text-zinc-400 mt-2 font-mono">Initializing regional sockets</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // Verified Regional Configuration Block for quickchatapp-57890
        const firebaseConfig = {
            apiKey: "AIzaSyA5rCtILh3LmIy9BwQV8IVtHBeshlog1jI",
            authDomain: "quickchatapp-57890.firebaseapp.com",
            databaseURL: "https://quickchatapp-57890-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "quickchatapp-57890",
            storageBucket: "quickchatapp-57890.firebasestorage.app",
            messagingSenderId: "732242608209",
            appId: "1:732242608209:web:d38008e8a4453a6d16b870"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const MESH_TRACKERS = [
            'wss://tracker.openwebtorrent.com',
            'wss://tracker.btorrent.xyz',
            'wss://tracker.webtorrent.dev'
        ];
        
        const client = new WebTorrent({ tracker: { announce: MESH_TRACKERS } });

        // DOM Targets
        const setupPanel = document.getElementById('setup-panel');
        const playerPanel = document.getElementById('player-panel');
        const videoFrame = document.getElementById('video-frame');
        const localPreview = document.getElementById('local-preview');
        const viewerMount = document.getElementById('viewer-mount');
        const loadingOverlay = document.getElementById('loading-overlay');
        const uiStateText = document.getElementById('ui-state-text');
        const uiSubText = document.getElementById('ui-sub-text');
        const statusChip = document.getElementById('status-chip');
        const toastAlert = document.getElementById('toast-alert');

        function setUIState(main, sub, chipState = 'loading') {
            uiStateText.innerText = main;
            uiSubText.innerText = sub;
            
            if (chipState === 'live') {
                statusChip.innerHTML = '<span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>LIVE STREAM</span>';
                statusChip.className = 'px-4 py-1.5 text-sm font-bold bg-red-500/10 text-red-500 rounded-full border border-red-500/20';
            } else if (chipState === 'viewing') {
                statusChip.innerHTML = '<span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span>SYNCED</span>';
                statusChip.className = 'px-4 py-1.5 text-sm font-bold bg-green-500/10 text-green-400 rounded-full border border-green-500/20';
            }
        }

        function triggerError(msg) {
            toastAlert.innerText = msg;
            toastAlert.classList.remove('-translate-y-full');
            setTimeout(() => toastAlert.classList.add('-translate-y-full'), 5000);
            
            setupPanel.classList.remove('hidden');
            playerPanel.classList.add('hidden');
            statusChip.innerHTML = 'System Error';
        }

        // Automatic container fallback engine
        function checkCodecs() {
            const codecs = ['video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
            return codecs.find(type => MediaRecorder.isTypeSupported(type)) || '';
        }

        window.bootSystem = async (role) => {
            const rawRoom = document.getElementById('passcode').value.trim();
            if (!rawRoom) return triggerError("Passcode is required to establish a mesh.");
            const roomCode = rawRoom.toLowerCase().replace(/[^a-z0-9-]/g, '-');
            const ratioFormat = document.getElementById('ratio-select').value;

            setupPanel.classList.add('hidden');
            playerPanel.classList.remove('hidden');
            playerPanel.classList.add('flex');
            
            const roomRef = ref(db, `firestream/${roomCode}`);

            try {
                if (role === 'broadcaster') {
                    setUIState("Authenticating Room...", "Connecting directly to Singapore node...");
                    
                    const snapshot = await get(roomRef);
                    if (snapshot.exists() && snapshot.val().active) {
                        return triggerError("Room collision! Someone is already broadcasting on this key.");
                    }

                    if (ratioFormat === 'portrait') {
                        videoFrame.classList.remove('ratio-landscape');
                        videoFrame.classList.add('ratio-portrait');
                    } else {
                        videoFrame.classList.add('ratio-landscape');
                    }

                    setUIState("Acquiring Hardware...", "Requesting Camera & Microphone access");
                    await set(roomRef, { active: true, format: ratioFormat, hash: null, timestamp: Date.now() });
                    onDisconnect(roomRef).remove();

                    const constraints = {
                        audio: true,
                        video: ratioFormat === 'portrait' 
                            ? { width: { ideal: 480 }, height: { ideal: 854 }, facingMode: 'user' }
                            : { width: { ideal: 854 }, height: { ideal: 480 }, facingMode: 'user' }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    localPreview.srcObject = stream;
                    localPreview.classList.remove('hidden');
                    
                    const targetMime = checkCodecs();
                    if(!targetMime) throw new Error("No usable MediaRecorder codecs found on this device.");

                    setUIState("Generating Live Mesh...", `Encoding via ${targetMime}`, "live");
                    setTimeout(() => loadingOverlay.classList.add('opacity-0', 'pointer-events-none'), 1000);

                    const recorder = new MediaRecorder(stream, { mimeType: targetMime });
                    
                    recorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            const chunkFile = new File([e.data], `live-${Date.now()}.webm`, { type: targetMime });
                            
                            if (client.torrents.length > 0) {
                                client.torrents.forEach(t => t.destroy());
                            }

                            client.seed(chunkFile, { announce: MESH_TRACKERS }, (torrent) => {
                                set(roomRef, { 
                                    active: true, 
                                    format: ratioFormat,
                                    hash: torrent.infoHash, 
                                    timestamp: Date.now() 
                                });
                            });
                        }
                    };
                    recorder.start(3500);

                } else if (role === 'viewer') {
                    setUIState("Scanning Database...", "Listening to Singapore cluster updates...");
                    let lastHash = null;

                    onValue(roomRef, (snapshot) => {
                        const data = snapshot.val();
                        
                        if (!data || !data.active) {
                            loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');
                            setUIState("Stream Offline", "Waiting for broadcaster to connect...");
                            viewerMount.innerHTML = '';
                            return;
                        }

                        if (data.format === 'portrait') {
                            videoFrame.classList.remove('ratio-landscape');
                            videoFrame.classList.add('ratio-portrait');
                        } else {
                            videoFrame.classList.remove('ratio-portrait');
                            videoFrame.classList.add('ratio-landscape');
                        }

                        if (data.hash && data.hash !== lastHash) {
                            lastHash = data.hash;
                            setUIState("Routing Data...", "Handshaking with P2P swarm", "viewing");
                            
                            if (client.get(data.hash)) return;

                            client.add(data.hash, { announce: MESH_TRACKERS }, (torrent) => {
                                const videoFile = torrent.files[0];
                                if (!videoFile) return;

                                videoFile.renderTo(viewerMount, { autoplay: true, muted: true, controls: true }, (err, elem) => {
                                    if (err) return;
                                    
                                    loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                                    elem.classList.add('w-full', 'h-full', 'object-cover', 'absolute', 'inset-0');
                                    elem.setAttribute('playsinline', 'true');
                                    
                                    const oldNodes = viewerMount.querySelectorAll('video');
                                    if (oldNodes.length > 1) oldNodes[0].remove();
                                });
                            });
                        }
                    });
                }
            } catch (error) {
                triggerError(error.message);
            }
        };
    </script>
</body>
</html>
