<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStream | Pure P2P WebRTC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #040406;
            color: #F3F4F6;
            min-height: 100vh;
            margin: 0;
        }
        .mesh-glow {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(249, 115, 22, 0.1), transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(220, 38, 38, 0.08), transparent 45%);
            filter: blur(50px);
        }
        .glass-panel {
            background: rgba(18, 18, 22, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <div class="mesh-glow"></div>

    <div class="w-full max-w-3xl glass-panel rounded-3xl p-6 md:p-8 relative overflow-hidden">
        
        <div class="flex items-center justify-between border-b border-white/10 pb-4 mb-6">
            <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-orange-500 animate-pulse"></span>
                FireStream Live <span class="text-xs text-zinc-500 font-mono">v4.0 WebRTC</span>
            </h1>
            <span id="status-tag" class="text-xs bg-zinc-800 text-zinc-400 px-3 py-1 rounded-full font-mono">STANDBY</span>
        </div>

        <div id="setup-panel" class="space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-zinc-400 block mb-2 font-semibold">Stream Room ID</label>
                    <input type="text" id="room-input" placeholder="e.g., test-room-99" class="w-full bg-black/40 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-2 font-semibold">Target Lens</label>
                    <select id="camera-facing" class="w-full bg-black/40 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-orange-500">
                        <option value="user">Front Camera (Selfie)</option>
                        <option value="environment">Back Camera (Main Lens)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="bootSession(true)" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3.5 px-6 rounded-xl transition-all">
                    Deploy Broadcaster
                </button>
                <button onclick="bootSession(false)" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all border border-zinc-700">
                    Connect Viewer
                </button>
            </div>
        </div>

        <div id="player-panel" class="hidden flex-col w-full">
            <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-zinc-900 relative">
                
                <video id="video-display" autoplay playsinline class="w-full h-full object-cover"></video>
                
                <div id="loading-overlay" class="absolute inset-0 bg-zinc-950 flex flex-col items-center justify-center z-30 transition-opacity duration-300">
                    <div class="w-8 h-8 border-3 border-zinc-800 border-t-orange-500 rounded-full animate-spin mb-3"></div>
                    <p id="loading-text" class="text-xs text-zinc-400 font-mono">Initializing connection profile...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Paste your plain numeric ScaleDrone Channel ID string right here
        const SCALEDRONE_CHANNEL_ID = 'UD5envlVO31CWZXH'; 

        let roomName, isBroadcaster, drone, room, pc;
        let localStream = null;

        const statusTag = document.getElementById('status-tag');
        const setupPanel = document.getElementById('setup-panel');
        const playerPanel = document.getElementById('player-panel');
        const videoDisplay = document.getElementById('video-display');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        // High availability STUN configurations
        const rtcConfiguration = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };

        function setStatusUI(text, isLive) {
            statusTag.innerText = text;
            if (isLive) {
                statusTag.className = "text-xs bg-green-500/10 text-green-400 px-3 py-1 rounded-full font-mono";
                loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
            } else {
                statusTag.className = "text-xs bg-red-500/10 text-red-400 px-3 py-1 rounded-full font-mono";
                loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');
            }
        }

        function bootSession(broadcasterIntent) {
            const rawRoom = document.getElementById('room-input').value.trim();
            if (!rawRoom) return alert('Please enter a valid room key.');
            
            roomName = rawRoom.toLowerCase().replace(/[^a-z0-9]/g, '-');
            isBroadcaster = broadcasterIntent;

            setupPanel.classList.add('hidden');
            playerPanel.classList.remove('hidden');
            playerPanel.classList.add('flex');

            loadingText.innerText = "Connecting to ScaleDrone signaling router...";

            drone = new ScaleDrone(SCALEDRONE_CHANNEL_ID);

            drone.on('open', error => {
                if (error) {
                    return setStatusUI("CONN FAULT", false);
                }
                
                // IMPORTANT: Prefixing with observable- lets unauthenticated users track presence states natively
                room = drone.subscribe(`observable-${roomName}`);
                
                room.on('open', err => {
                    if (err) {
                        return setStatusUI("ROOM FAULT", false);
                    }
                    setStatusUI("SIGNAL OPEN", !isBroadcaster);
                    initializeWebRTCPipeline();
                });
            });
        }

        async function initializeWebRTCPipeline() {
            pc = new RTCPeerConnection(rtcConfiguration);

            pc.onicecandidate = event => {
                if (event.candidate) {
                    sendSignalingMessage({ candidate: event.candidate });
                }
            };

            if (isBroadcaster) {
                loadingText.innerText = "Claiming camera matrix feeds...";
                const selectedFacing = document.getElementById('camera-facing').value;
                
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: { facingMode: selectedFacing, width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    
                    videoDisplay.srcObject = localStream;
                    videoDisplay.muted = true; // Avoid feedback loops on your device
                    
                    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                    setStatusUI("LIVE BROADCAST", true);
                } catch (e) {
                    alert('Camera access failed: ' + e.message);
                    setStatusUI("HW ERROR", false);
                }

                // Fire connection offers ONLY when a viewer triggers a data check presence channel
                room.on('members', members => {
                    if (members.length > 1) {
                        pc.createOffer().then(offer => {
                            return pc.setLocalDescription(offer);
                        }).then(() => {
                            sendSignalingMessage({ sdp: pc.localDescription });
                        });
                    }
                });
            } else {
                loadingText.innerText = "Awaiting live data streams from channel...";
                videoDisplay.muted = false;

                pc.ontrack = event => {
                    if (videoDisplay.srcObject !== event.streams[0]) {
                        videoDisplay.srcObject = event.streams[0];
                        setStatusUI("STREAM SYNCED", true);
                    }
                };
            }

            // Real-Time signaling data matrix decoder
            room.on('data', (message, client) => {
                if (client.id === drone.clientId) return;

                if (message.sdp) {
                    pc.setRemoteDescription(new RTCSessionDescription(message.sdp)).then(() => {
                        if (pc.remoteDescription.type === 'offer') {
                            pc.createAnswer().then(answer => {
                                return pc.setLocalDescription(answer);
                            }).then(() => {
                                sendSignalingMessage({ sdp: pc.localDescription });
                            });
                        }
                    });
                } else if (message.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(message.candidate)).catch(e => console.error(e));
                }
            });
        }

        function sendSignalingMessage(msg) {
            drone.publish({ room: `observable-${roomName}`, message: msg });
        }
    </script>
</body>
</html>
