<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStream Pro | WebRTC Matrix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>

    <style>
        :root {
            --md-surface: rgba(18, 18, 22, 0.8);
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #030305;
            color: #F3F4F6;
            min-height: 100vh;
        }
        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(249, 115, 22, 0.1), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(220, 38, 38, 0.08), transparent 50%);
            filter: blur(40px);
        }
        .glass-card {
            background: var(--md-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <div class="mesh-gradient"></div>

    <div class="w-full max-w-3xl glass-card rounded-3xl p-6 md:p-8 relative shadow-2xl">
        <div class="flex items-center justify-between border-b border-white/10 pb-4 mb-6">
            <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-orange-500 animate-pulse"></span>
                FireStream Live <span class="text-xs text-zinc-500 font-mono">v3.0 WebRTC</span>
            </h1>
            <span id="status-tag" class="text-xs bg-zinc-800 text-zinc-400 px-3 py-1 rounded-full font-mono">DISCONNECTED</span>
        </div>

        <div id="setup-panel" class="space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-zinc-400 block mb-2 font-semibold">Stream Room Name</label>
                    <input type="text" id="room-input" placeholder="e.g., live-class" class="w-full bg-black/40 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-2 font-semibold">Camera Source</label>
                    <select id="camera-facing" class="w-full bg-black/40 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-orange-500">
                        <option value="user">Front Camera (Selfie)</option>
                        <option value="environment">Back Camera (Environment)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="startSession(true)" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3.5 px-6 rounded-xl transition-all">Start Broadcast</button>
                <button onclick="startSession(false)" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all">Join Stream</button>
            </div>
        </div>

        <div id="player-panel" class="hidden mt-4 w-full">
            <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-zinc-900 relative shadow-inner">
                <video id="video-canvas" autoplay playsinline class="w-full h-full object-cover"></video>
                
                <div id="loading-overlay" class="absolute inset-0 bg-zinc-950 flex flex-col items-center justify-center z-30 transition-opacity duration-300">
                    <div class="w-8 h-8 border-3 border-zinc-800 border-t-orange-500 rounded-full animate-spin mb-3"></div>
                    <p id="loading-text" class="text-xs text-zinc-400 font-mono">Initializing local streams...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // INSERT YOUR SCALEDRONE CHANNEL ID HERE
        const SCALEDRONE_CHANNEL_ID = 'UD5envlVO31CWZXH'; 
        
        let roomName, isBroadcaster, drone, room, pc;
        
        const statusTag = document.getElementById('status-tag');
        const setupPanel = document.getElementById('setup-panel');
        const videoCanvas = document.getElementById('video-canvas');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        // High-availability public fallback STUN configuration
        const rtcConfiguration = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };

        function startSession(broadcasterIntent) {
            roomName = document.getElementById('room-input').value.trim().toLowerCase();
            if (!roomName) return alert('Please enter a room name.');
            
            isBroadcaster = broadcasterIntent;
            setupPanel.classList.add('hidden');
            playerPanel.classList.remove('hidden');

            // Connect directly to the ScaleDrone signaling mesh
            drone = new ScaleDrone(SCALEDRONE_CHANNEL_ID);
            
            drone.on('open', error => {
                if (error) return console.error(error);
                room = drone.subscribe(`observable-${roomName}`);
                statusTag.innerText = "CONNECTED TO MATRIX";
                statusTag.className = "text-xs bg-green-500/10 text-green-400 px-3 py-1 rounded-full font-mono";
                
                executeWebRTCPipeline();
            });
        }

        async function executeWebRTCPipeline() {
            pc = new RTCPeerConnection(rtcConfiguration);

            // Manage network connectivity signals (ICE Candidates)
            pc.onicecandidate = event => {
                if (event.candidate) {
                    sendSignalingMessage({ candidate: event.candidate });
                }
            };

            if (isBroadcaster) {
                loadingText.innerText = "Accessing selected camera hardware...";
                const selectedFacing = document.getElementById('camera-facing').value;
                
                try {
                    const localStream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: { facingMode: selectedFacing, width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    
                    videoCanvas.srcObject = localStream;
                    videoCanvas.muted = true; // Prevents sound looping locally
                    
                    // Attach tracks directly to the WebRTC connection stream
                    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                    loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                } catch (e) {
                    alert('Camera access denied or unavailable: ' + e.message);
                }

                // Negotiate connection rules when a viewer joins
                room.on('members', members => {
                    if (members.length > 1) {
                        pc.createOffer().then(offer => {
                            return pc.setLocalDescription(offer);
                        }).then(() => {
                            sendSignalingMessage({ sdp: pc.localDescription });
                        });
                    }
                });
            } else {
                // Viewer settings: Handle incoming video tracks natively
                loadingText.innerText = "Awaiting broadcaster data packets...";
                videoCanvas.muted = false; // Viewers must hear audio!

                pc.ontrack = event => {
                    if (videoCanvas.srcObject !== event.streams[0]) {
                        videoCanvas.srcObject = event.streams[0];
                        loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                    }
                };
            }

            // Route connection signals via ScaleDrone
            room.on('data', (message, client) => {
                if (client.id === drone.clientId) return; // Skip our own signals

                if (message.sdp) {
                    pc.setRemoteDescription(new RTCSessionDescription(message.sdp)).then(() => {
                        if (pc.remoteDescription.type === 'offer') {
                            pc.createAnswer().then(answer => {
                                return pc.setLocalDescription(answer);
                            }).then(() => {
                                sendSignalingMessage({ sdp: pc.localDescription });
                            });
                        }
                    });
                } else if (message.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(message.candidate)).catch(e => console.error(e));
                }
            });
        }

        function sendSignalingMessage(msg) {
            drone.publish({ room: `observable-${roomName}`, message: msg });
        }
    </script>
</body>
</html>
