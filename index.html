<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStream | Final Stable Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        body { background: #040406; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(20px); border: 1px solid #333; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-2xl glass rounded-3xl p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-bold text-lg">FireStream <span id="status-tag" class="text-[10px] bg-red-900 px-2 py-1 rounded">STANDBY</span></h1>
        </div>

        <div id="setup-panel" class="space-y-4">
            <input type="text" id="room-input" placeholder="Room Name" class="w-full bg-black p-3 rounded-lg border border-gray-700">
            <select id="camera-facing" class="w-full bg-black p-3 rounded-lg border border-gray-700">
                <option value="user">Front Camera</option>
                <option value="environment">Back Camera</option>
            </select>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="bootSession(true)" class="bg-orange-600 p-3 rounded-lg font-bold">Broadcaster</button>
                <button onclick="bootSession(false)" class="bg-gray-800 p-3 rounded-lg font-bold">Viewer</button>
            </div>
        </div>

        <div id="player-panel" class="hidden">
            <video id="video-display" autoplay playsinline class="w-full aspect-video bg-black rounded-xl"></video>
            <p class="text-center text-xs mt-4 text-gray-400">If screen is black, tap the video to unlock audio/video sync.</p>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR NUMERIC CHANNEL ID (NOT SECRET KEY)
        const SCALEDRONE_CHANNEL_ID = 'YOUR_CHANNEL_ID_HERE'; 

        let drone, room, pc, isBroadcaster;
        const videoDisplay = document.getElementById('video-display');

        // Multi-Path ICE Configuration
        const rtcConfiguration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:global.stun.twilio.com:3478' }
            ],
            iceCandidatePoolSize: 10
        };

        function bootSession(broadcasterIntent) {
            const roomName = document.getElementById('room-input').value.toLowerCase().replace(/[^a-z0-9]/g, '-');
            if(!roomName) return alert("Enter Room Name");
            isBroadcaster = broadcasterIntent;
            
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('player-panel').classList.remove('hidden');

            drone = new ScaleDrone(SCALEDRONE_CHANNEL_ID);
            drone.on('open', () => {
                room = drone.subscribe(`observable-${roomName}`);
                room.on('open', () => {
                    document.getElementById('status-tag').innerText = "SIGNAL OPEN";
                    document.getElementById('status-tag').className = "text-[10px] bg-green-900 px-2 py-1 rounded";
                    initializeWebRTCPipeline();
                });
            });
        }

        function initializeWebRTCPipeline() {
            pc = new RTCPeerConnection(rtcConfiguration);

            pc.onicecandidate = e => e.candidate && drone.publish({ room: room.name, message: { candidate: e.candidate } });

            if (isBroadcaster) {
                const facing = document.getElementById('camera-facing').value;
                navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: facing } })
                .then(stream => {
                    videoDisplay.srcObject = stream;
                    videoDisplay.muted = true;
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));
                });

                room.on('members', members => {
                    if (members.length > 1) {
                        pc.createOffer().then(offer => {
                            pc.setLocalDescription(offer);
                            drone.publish({ room: room.name, message: { sdp: offer } });
                        });
                    }
                });
            } else {
                pc.ontrack = e => {
                    videoDisplay.srcObject = e.streams[0];
                    videoDisplay.play().catch(() => {
                        videoDisplay.onclick = () => videoDisplay.play();
                    });
                };
            }

            room.on('data', (data, client) => {
                if (client.id === drone.clientId) return;
                if (data.sdp) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.sdp)).then(() => {
                        if (data.sdp.type === 'offer') {
                            pc.createAnswer().then(answer => {
                                pc.setLocalDescription(answer);
                                drone.publish({ room: room.name, message: { sdp: answer } });
                            });
                        }
                    });
                } else if (data.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
        }
    </script>
</body>
</html>
