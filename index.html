<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStream | Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
            min-height: 100vh;
        }
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(249, 115, 22, 0.12) 0px, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(239, 68, 68, 0.08) 0px, transparent 50%);
        }
        .glass-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .ratio-landscape { aspect-ratio: 16 / 9; }
        .ratio-portrait { aspect-ratio: 9 / 16; max-height: 70vh; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 md:p-8 antialiased">
    <div class="mesh-bg"></div>

    <div class="w-full max-w-3xl glass-card rounded-3xl p-6 md:p-8 shadow-2xl relative">
        
        <div class="flex items-center justify-between border-b border-white/10 pb-5 mb-6">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-orange-500">
                    <path fill-rule="evenodd" d="M12.963 2.286a.75.75 0 00-1.071-.136 9.742 9.742 0 00-3.539 6.177A7.547 7.547 0 016.648 6.61a.75.75 0 00-1.152-.082A9 9 0 1015.68 4.534a7.46 7.46 0 01-2.717-2.248z" clip-rule="evenodd" />
                </svg>
                <h1 class="text-xl font-bold text-white tracking-tight">FireStream <span class="text-orange-500 font-medium text-sm px-2 py-0.5 bg-orange-500/10 rounded-md ml-1">v2.0</span></h1>
            </div>
            <div id="status-chip" class="text-xs font-semibold px-3 py-1 bg-zinc-800 text-zinc-400 rounded-full border border-zinc-700 font-mono">
                STATUS: IDLE
            </div>
        </div>

        <div id="error-logger" class="hidden mb-6 p-4 bg-red-950/40 border border-red-500/30 rounded-xl text-red-200 text-xs font-mono whitespace-pre-wrap overflow-x-auto"></div>

        <div id="setup-panel" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Stream Secret Key</label>
                    <input type="text" id="passcode" placeholder="e.g., my-mesh-room" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 transition-colors">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Aspect Ratio Aspect</label>
                    <select id="ratio-select" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 appearance-none">
                        <option value="landscape">Landscape (16:9 Cinema)</option>
                        <option value="portrait">Portrait (9:16 Mobile)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-4">
                <button onclick="launchNode('broadcaster')" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3.5 px-6 rounded-xl transition-all shadow-lg shadow-orange-600/10">
                    Broadcast Stream
                </button>
                <button onclick="launchNode('viewer')" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all border border-zinc-700">
                    Join Swarm
                </button>
            </div>
        </div>

        <div id="stage-panel" class="hidden flex-col items-center w-full">
            <div id="video-canvas" class="w-full relative rounded-2xl overflow-hidden bg-black border border-zinc-800 flex items-center justify-center ratio-landscape transition-all duration-500">
                
                <video id="hardware-preview" autoplay muted playsinline class="absolute inset-0 w-full h-full object-cover hidden"></video>
                
                <div id="mesh-viewport" class="absolute inset-0 w-full h-full"></div>

                <div id="loading-mask" class="absolute inset-0 bg-zinc-950/90 flex flex-col items-center justify-center z-20 transition-opacity duration-300">
                    <div class="w-10 h-10 border-4 border-zinc-800 border-t-orange-500 rounded-full animate-spin mb-4"></div>
                    <p id="state-title" class="text-sm font-semibold tracking-wide text-white">Connecting Engine...</p>
                    <p id="state-subtitle" class="text-xs text-zinc-500 mt-1 font-mono">Resolving system mapping</p>
                </div>
            </div>
            
            <div class="w-full mt-4 flex justify-between items-center text-[11px] text-zinc-500 font-mono bg-zinc-900/40 p-3 rounded-xl border border-white/5">
                <span id="meta-role">Identity: Scanning</span>
                <span id="meta-peers">Swarm Nodes: 0</span>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // Production Configuration Block
        const firebaseConfig = {
            apiKey: "AIzaSyA5rCtILh3LmIy9BwQV8IVtHBeshlog1jI",
            authDomain: "quickchatapp-57890.firebaseapp.com",
            databaseURL: "https://quickchatapp-57890-default-rtdb.firebaseio.com",
            projectId: "quickchatapp-57890",
            storageBucket: "quickchatapp-57890.firebasestorage.app",
            messagingSenderId: "732242608209",
            appId: "1:732242608209:web:d38008e8a4453a6d16b870"
        };

        // Fail-safe initialization wrapper
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
        } catch(e) {
            document.getElementById('error-logger').innerText = `Firebase Init Error: ${e.message}`;
            document.getElementById('error-logger').classList.remove('hidden');
        }
        
        const TRACKERS = ['wss://tracker.openwebtorrent.com', 'wss://tracker.btorrent.xyz', 'wss://tracker.webtorrent.dev'];
        const client = new WebTorrent();

        // UI Target Nodes
        const setupPanel = document.getElementById('setup-panel');
        const stagePanel = document.getElementById('stage-panel');
        const videoCanvas = document.getElementById('video-canvas');
        const hardwarePreview = document.getElementById('hardware-preview');
        const meshViewport = document.getElementById('mesh-viewport');
        const loadingMask = document.getElementById('loading-mask');
        const stateTitle = document.getElementById('state-title');
        const stateSubtitle = document.getElementById('state-subtitle');
        const statusChip = document.getElementById('status-chip');
        const errorLogger = document.getElementById('error-logger');

        function setStatus(title, sub, badgeStyle = 'process') {
            stateTitle.innerText = title;
            stateSubtitle.innerText = sub;
            if (badgeStyle === 'live') {
                statusChip.className = "text-xs font-bold px-3 py-1 bg-red-500/10 text-red-500 rounded-full border border-red-500/20";
                statusChip.innerText = "🔴 LIVE BROADCAST";
            } else if (badgeStyle === 'sync') {
                statusChip.className = "text-xs font-bold px-3 py-1 bg-green-500/10 text-green-400 rounded-full border border-green-500/20";
                statusChip.innerText = "🟢 SWARM SYNCED";
            }
        }

        // Helper function to dynamically locate a supported container type on the hardware layout
        function getSupportedMimeType() {
            const types = [
                'video/webm;codecs=vp8',
                'video/webm;codecs=vp9',
                'video/webm',
                'video/mp4;codecs=avc1',
                'video/mp4'
            ];
            for (let type of types) {
                if (MediaRecorder.isTypeSupported(type)) return type;
            }
            return '';
        }

        window.launchNode = async (role) => {
            errorLogger.classList.add('hidden'); // Clear prior warnings
            const keyInput = document.getElementById('passcode').value.trim();
            if (!keyInput) return alert("Please assign a secret key before establishing the node.");
            
            const sanitizedKey = keyInput.toLowerCase().replace(/[^a-z0-9-]/g, '-');
            const ratioFormat = document.getElementById('ratio-select').value;

            setupPanel.classList.add('hidden');
            stagePanel.classList.remove('hidden');
            stagePanel.classList.add('flex');
            document.getElementById('meta-role').innerText = `Identity: ${role.toUpperCase()}`;

            const roomRef = ref(db, `firestream/${sanitizedKey}`);

            try {
                if (role === 'broadcaster') {
                    setStatus("Validating Security Matrix...", "Reading token references from RealtimeDB...");
                    
                    const snapshot = await get(roomRef);
                    if (snapshot.exists() && snapshot.val().active) {
                        throw new Error("Room Collision: This channel is currently occupied by an active broadcast node.");
                    }

                    // Mutate aspect ratio styling parameters dynamically
                    if (ratioFormat === 'portrait') {
                        videoCanvas.classList.remove('ratio-landscape');
                        videoCanvas.classList.add('ratio-portrait');
                    }

                    await set(roomRef, { active: true, format: ratioFormat, hash: null, timestamp: Date.now() });
                    onDisconnect(roomRef).remove();

                    setStatus("Accessing Media Hardware...", "Awaiting user camera permission allocation...");
                    
                    const constraints = {
                        audio: true,
                        video: ratioFormat === 'portrait' 
                            ? { width: { ideal: 480 }, height: { ideal: 854 }, facingMode: 'user' }
                            : { width: { ideal: 854 }, height: { ideal: 480 }, facingMode: 'user' }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    hardwarePreview.srcObject = stream;
                    hardwarePreview.classList.remove('hidden');

                    const detectedMime = getSupportedMimeType();
                    if (!detectedMime) throw new Error("Hardware Error: The browser lacks a compatible MediaRecorder recording container format.");

                    setStatus("Spawning Mesh Pipelines...", `Encoding stream chunking with wrapper: ${detectedMime}`, "live");
                    setTimeout(() => loadingMask.classList.add('opacity-0', 'pointer-events-none'), 800);

                    const recorder = new MediaRecorder(stream, { mimeType: detectedMime });
                    
                    recorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            const segmentFile = new File([e.data], `seg-${Date.now()}.webm`, { type: detectedMime });
                            
                            // Prevent heap memory leakage by clearing old tracking entries
                            if(client.torrents.length > 0) {
                                client.torrents.forEach(t => t.destroy());
                            }

                            client.seed(segmentFile, { announce: TRACKERS }, (torrent) => {
                                set(roomRef, { 
                                    active: true, 
                                    format: ratioFormat,
                                    hash: torrent.infoHash, 
                                    timestamp: Date.now() 
                                });
                                document.getElementById('meta-peers').innerText = `Swarm Nodes: ${torrent.numPeers}`;
                            });
                        }
                    };
                    recorder.start(4000); // stable 4-second intervals

                } else if (role === 'viewer') {
                    setStatus("Awaiting Telemetry Sync...", "Listening for valid tracking broadcast tokens...");
                    let activeHash = null;

                    onValue(roomRef, (snapshot) => {
                        const data = snapshot.val();
                        
                        if (!data || !data.active) {
                            loadingMask.classList.remove('opacity-0', 'pointer-events-none');
                            setStatus("Channel Inactive", "The target stream signature is either offline or disconnected.");
                            meshViewport.innerHTML = '';
                            return;
                        }

                        if (data.format === 'portrait') {
                            videoCanvas.classList.remove('ratio-landscape');
                            videoCanvas.classList.add('ratio-portrait');
                        } else {
                            videoCanvas.classList.remove('ratio-portrait');
                            videoCanvas.classList.add('ratio-landscape');
                        }

                        if (data.hash && data.hash !== activeHash) {
                            activeHash = data.hash;
                            setStatus("Routing Data Array...", "Resolving cluster verification handshakes...", "sync");
                            
                            if (client.get(data.hash)) return;

                            client.add(data.hash, { announce: TRACKERS }, (torrent) => {
                                const chunkAsset = torrent.files[0];
                                if (!chunkAsset) return;

                                torrent.on('wire', () => {
                                    document.getElementById('meta-peers').innerText = `Swarm Nodes: ${torrent.numPeers}`;
                                });

                                chunkAsset.renderTo(meshViewport, { autoplay: true, muted: true, controls: true }, (err, element) => {
                                    if (err) return;
                                    
                                    loadingMask.classList.add('opacity-0', 'pointer-events-none');
                                    element.classList.add('w-full', 'h-full', 'object-cover', 'absolute', 'inset-0');
                                    element.setAttribute('playsinline', 'true');
                                    
                                    // Destructive cleanup to prevent stacking background audio layers
                                    const layeredPlayers = meshViewport.querySelectorAll('video');
                                    if (layeredPlayers.length > 1) layeredPlayers[0].remove();
                                });
                            });
                        }
                    });
                }
            } catch (fatalCrash) {
                console.error("CRITICAL RUNTIME EXCEPTION:", fatalCrash);
                
                // Expose raw exception parameters explicitly inside the container frame
                errorLogger.innerText = `[RUNTIME CRASH INTERCEPTED]\nException Identity: ${fatalCrash.name}\nLog Trace: ${fatalCrash.message}\n\nSuggestions: Check your web console logs or double check that your Firebase Realtime rules don't contain a syntax error. Ensure you are loading via an encrypted context (HTTPS).`;
                errorLogger.classList.remove('hidden');

                // Return interface components cleanly
                statusChip.className = "text-xs font-bold px-3 py-1 bg-red-500/10 text-red-500 rounded-full border border-red-500/20";
                statusChip.innerText = "❌ PIPELINE CRASHED";
                setupPanel.classList.remove('hidden');
                stagePanel.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
