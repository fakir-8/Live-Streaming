<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStream | Pro Mesh Network</title>
    
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: #09090b;
            background-image: 
                radial-gradient(at 0% 0%, hsla(17,100%,50%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(17,100%,50%,0.1) 0px, transparent 50%);
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Hide scrollbars for clean UI */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 antialiased">

    <div class="w-full max-w-2xl glass-panel rounded-3xl p-6 md:p-8 transition-all duration-500">
        
        <div class="flex items-center justify-between border-b border-white/10 pb-6 mb-6">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-orange-500 animate-pulse">
                    <path fill-rule="evenodd" d="M12.963 2.286a.75.75 0 00-1.071-.136 9.742 9.742 0 00-3.539 6.177A7.547 7.547 0 016.648 6.61a.75.75 0 00-1.152-.082A9 9 0 1015.68 4.534a7.46 7.46 0 01-2.717-2.248z" clip-rule="evenodd" />
                </svg>
                <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-br from-orange-400 to-red-600 bg-clip-text text-transparent">FireStream</h1>
            </div>
            <span id="status-badge" class="px-3 py-1 text-xs font-semibold bg-zinc-800 text-zinc-400 rounded-full border border-zinc-700 transition-colors duration-300">
                System Idle
            </span>
        </div>

        <div id="setup-screen" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-semibold text-zinc-400 uppercase tracking-wider">Stream Passcode</label>
                <input type="text" id="passcode" placeholder="e.g., dhaka-live-2026" class="w-full bg-black/50 border border-zinc-800 rounded-xl px-4 py-4 text-lg text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all placeholder:text-zinc-700">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                <button onclick="bootApp('broadcaster')" class="group relative bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 px-6 rounded-xl transition-all overflow-hidden">
                    <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    <span class="relative flex items-center justify-center gap-2">🎥 Start Broadcast</span>
                </button>
                <button onclick="bootApp('viewer')" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-4 px-6 rounded-xl transition-all border border-zinc-700 hover:border-zinc-500">
                    👀 Join Stream
                </button>
            </div>
        </div>

        <div id="player-screen" class="hidden space-y-4">
            <div id="video-container" class="relative rounded-2xl overflow-hidden bg-black aspect-video border border-zinc-800 shadow-inner">
                
                <video id="local-cam" autoplay muted playsinline class="w-full h-full object-cover hidden"></video>
                
                <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80">
                    <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p id="loading-text" class="text-sm text-zinc-400 font-mono">Establishing mesh...</p>
                </div>

                <div id="viewer-mount" class="w-full h-full relative"></div>
            </div>

            <div id="terminal-console" class="text-xs text-zinc-500 bg-black/40 p-3 rounded-xl border border-zinc-800/50 font-mono text-center">
                Awaiting commands...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // Firebase Configuration (v12 Modular)
        const firebaseConfig = {
            apiKey: "AIzaSyA5rCtILh3LmIy9BwQV8IVtHBeshlog1jI",
            authDomain: "quickchatapp-57890.firebaseapp.com",
            databaseURL: "https://quickchatapp-57890-default-rtdb.firebaseio.com",
            projectId: "quickchatapp-57890",
            storageBucket: "quickchatapp-57890.firebasestorage.app",
            messagingSenderId: "732242608209",
            appId: "1:732242608209:web:d38008e8a4453a6d16b870"
        };

        // Engine Initialization
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const torrentClient = new WebTorrent();

        // UI Selectors
        const setupScreen = document.getElementById('setup-screen');
        const playerScreen = document.getElementById('player-screen');
        const localCam = document.getElementById('local-cam');
        const viewerMount = document.getElementById('viewer-mount');
        const statusBadge = document.getElementById('status-badge');
        const loadingSpinner = document.getElementById('loading-spinner');
        const terminalConsole = document.getElementById('terminal-console');

        function updateTerminal(msg, state = 'normal') {
            terminalConsole.innerText = msg;
            if(state === 'live') {
                statusBadge.innerText = '🔴 LIVE';
                statusBadge.className = 'px-3 py-1 text-xs font-bold bg-red-500/20 text-red-500 rounded-full border border-red-500/30 animate-pulse';
            } else if (state === 'viewing') {
                statusBadge.innerText = '🟢 SYNCED';
                statusBadge.className = 'px-3 py-1 text-xs font-bold bg-green-500/20 text-green-400 rounded-full border border-green-500/30';
            }
        }

        window.bootApp = async (role) => {
            const rawRoom = document.getElementById('passcode').value.trim();
            if (!rawRoom) return alert("Please enter a stream passcode.");
            const roomCode = rawRoom.toLowerCase().replace(/[^a-z0-9-]/g, '-'); // Sanitize input

            setupScreen.classList.add('hidden');
            playerScreen.classList.remove('hidden');
            const roomRef = ref(db, `firestream/${roomCode}`);

            if (role === 'broadcaster') {
                updateTerminal("Checking room availability...");
                
                // 1. COLLISION PREVENTION: Check if room is already active
                const snapshot = await get(roomRef);
                if (snapshot.exists() && snapshot.val().active) {
                    alert("💥 Blast! This room is already in use by another broadcaster.");
                    window.location.reload(); // Reset app
                    return;
                }

                // Lock the room and set auto-cleanup
                await set(roomRef, { active: true, hash: null, timestamp: Date.now() });
                onDisconnect(roomRef).remove(); 

                updateTerminal("Booting camera...", "live");
                try {
                    // Strict resolution limits to prevent mobile hardware freezing
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 24 } },
                        audio: true
                    });
                    
                    // 2. AUDIO LOOP FIX: Force mute on local hardware preview
                    localCam.srcObject = stream;
                    localCam.muted = true;
                    localCam.volume = 0;
                    localCam.classList.remove('hidden');
                    loadingSpinner.classList.add('hidden');

                    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp8' });
                    
                    // Chunk creation and DHT routing
                    recorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            const chunkFile = new File([e.data], `chunk-${Date.now()}.webm`, { type: 'video/webm' });
                            
                            // Destroy previous torrent to prevent memory bloat
                            if (torrentClient.torrents.length > 0) {
                                torrentClient.torrents.forEach(t => t.destroy());
                            }

                            torrentClient.seed(chunkFile, (torrent) => {
                                set(roomRef, { active: true, hash: torrent.infoHash, timestamp: Date.now() });
                                updateTerminal(`Seeding fragment... [Peers: ${torrent.numPeers}]`, 'live');
                            });
                        }
                    };
                    
                    recorder.start(4000); // 4-second optimized chunks

                } catch (err) {
                    updateTerminal(`Hardware Error: ${err.message}`);
                    alert("Camera access denied or hardware error.");
                }

            } else if (role === 'viewer') {
                updateTerminal("Connecting to Firebase tracker...", "viewing");
                let lastRenderedHash = null;

                onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    
                    if (!data || !data.active) {
                        updateTerminal("Stream offline or ended.");
                        viewerMount.innerHTML = '';
                        loadingSpinner.classList.remove('hidden');
                        document.getElementById('loading-text').innerText = "Stream offline";
                        return;
                    }

                    if (data.hash && data.hash !== lastRenderedHash) {
                        lastRenderedHash = data.hash;
                        updateTerminal("Fetching mesh fragment...", "viewing");
                        
                        // Prevent fetching a torrent we already have
                        if (torrentClient.get(data.hash)) return;

                        torrentClient.add(data.hash, (torrent) => {
                            const videoFile = torrent.files.find(f => f.name.endsWith('.webm'));
                            if (!videoFile) return;

                            videoFile.renderTo(viewerMount, { autoplay: true, muted: false }, (err, elem) => {
                                if (err) return;
                                
                                loadingSpinner.classList.add('hidden');
                                
                                // Format the incoming video element
                                elem.classList.add('w-full', 'h-full', 'object-cover', 'absolute', 'top-0', 'left-0');
                                elem.setAttribute('playsinline', 'true');
                                
                                // 3. GARBAGE COLLECTION: Remove older chunks from DOM to prevent bloat
                                const existingVideos = viewerMount.querySelectorAll('video');
                                if (existingVideos.length > 1) {
                                    // Keep only the newest video (the one that just appended)
                                    existingVideos[0].remove();
                                }
                            });
                        });
                    }
                });
            }
        };
    </script>
</body>
</html>
