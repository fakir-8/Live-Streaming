<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaMesh | Firebase v12 P2P</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-2xl">
        <h1 class="text-2xl font-bold mb-4">LuminaMesh Node</h1>
        <input type="text" id="passcode" placeholder="Stream Key" class="w-full bg-black p-3 rounded-xl mb-4 border border-gray-700">
        <div class="grid grid-cols-2 gap-4">
            <button onclick="boot('broadcaster')" class="bg-indigo-600 p-3 rounded-xl">Broadcaster</button>
            <button onclick="boot('viewer')" class="bg-gray-700 p-3 rounded-xl">Viewer</button>
        </div>
        <div id="video-wrapper" class="mt-6 aspect-video bg-black rounded-xl overflow-hidden"></div>
        <div id="log" class="mt-4 text-xs text-gray-500 font-mono">System Ready...</div>
    </div>

    <script type="module">
        // 1. IMPORT MODULAR FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, goOffline, goOnline } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5rCtILh3LmIy9BwQV8IVtHBeshlog1jI",
            authDomain: "quickchatapp-57890.firebaseapp.com",
            databaseURL: "https://quickchatapp-57890-default-rtdb.firebaseio.com", // MANDATORY: Ensure this is your DB URL
            projectId: "quickchatapp-57890",
            storageBucket: "quickchatapp-57890.firebasestorage.app",
            messagingSenderId: "732242608209",
            appId: "1:732242608209:web:d38008e8a4453a6d16b870"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const client = new WebTorrent();
        const logEl = document.getElementById('log');

        window.boot = async (role) => {
            const room = document.getElementById('passcode').value || 'default';
            if (role === 'broadcaster') {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                const recorder = new MediaRecorder(stream, {mimeType: 'video/webm;codecs=vp8'});
                recorder.ondataavailable = (e) => {
                    client.seed(new File([e.data], 'chunk.webm'), (torrent) => {
                        set(ref(db, 'streams/' + room), { hash: torrent.infoHash });
                    });
                };
                recorder.start(3000);
            } else {
                onValue(ref(db, 'streams/' + room), (snapshot) => {
                    const data = snapshot.val();
                    if (data?.hash) {
                        goOffline(db); // Disconnect to save connections
                        client.add(data.hash, (torrent) => {
                            torrent.files[0].appendTo('#video-wrapper');
                            setTimeout(() => goOnline(db), 3000); // Reconnect for next update
                        });
                    }
                });
            }
        };
    </script>
</body>
</html>
