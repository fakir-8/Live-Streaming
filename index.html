<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robust Mesh Streamer</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-md mx-auto space-y-4">
        <input type="text" id="key" placeholder="Enter Room Name" class="w-full bg-gray-800 p-3 rounded-lg">
        <div class="grid grid-cols-2 gap-2">
            <button onclick="start('broadcaster')" class="bg-red-600 p-3 rounded-lg font-bold">Go Live</button>
            <button onclick="start('viewer')" class="bg-blue-600 p-3 rounded-lg font-bold">Watch</button>
        </div>
        <div id="video-wrapper" class="aspect-video bg-gray-900 rounded-lg overflow-hidden border border-gray-700"></div>
        <div id="status" class="text-xs text-gray-400 font-mono italic">Status: Idle</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyA5rCtILh3LmIy9BwQV8IVtHBeshlog1jI",
            databaseURL: "https://quickchatapp-57890-default-rtdb.firebaseio.com",
            projectId: "quickchatapp-57890"
        };
        const db = getDatabase(initializeApp(config));
        const client = new WebTorrent();
        const status = document.getElementById('status');

        window.start = async (role) => {
            const room = document.getElementById('key').value || 'demo';
            status.innerText = "Initializing...";

            if (role === 'broadcaster') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({video: {width: 640, height: 480}, audio: true});
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    document.getElementById('video-wrapper').appendChild(video);

                    const recorder = new MediaRecorder(stream, {mimeType: 'video/webm;codecs=vp8'});
                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) {
                            client.seed(new File([e.data], 'chunk.webm'), (t) => {
                                set(ref(db, 'live/' + room), { hash: t.infoHash });
                                status.innerText = "Live! Peers: " + t.numPeers;
                            });
                        }
                    };
                    recorder.start(2000); // Trigger every 2s
                } catch (e) { status.innerText = "Error: " + e.message; }
            } else {
                onValue(ref(db, 'live/' + room), (snap) => {
                    const data = snap.val();
                    if (data?.hash) {
                        status.innerText = "Syncing mesh...";
                        client.add(data.hash, (t) => {
                            if (document.querySelector('video')) document.querySelector('video').remove();
                            t.files[0].appendTo('#video-wrapper');
                        });
                    }
                });
            }
        };
    </script>
</body>
</html>
